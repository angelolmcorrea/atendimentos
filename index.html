<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Atendimentos - AtendLog</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f11;
            --surface: #18181c;
            --surface2: #222228;
            --border: #2e2e38;
            --accent: #f0c040;
            --accent2: #e07d3c;
            --green: #3ecf8e;
            --blue: #5b9cf6;
            --red: #f26b6b;
            --text: #e8e8ec;
            --muted: #7a7a8e;
            --radius: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .page {
            display: none;
            min-height: 100vh;
        }

        .page.active {
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-dot {
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.7);
            }
        }

        .header-date {
            font-family: 'DM Mono', monospace;
            font-size: 0.78rem;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        main {
            flex: 1;
            padding: 32px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .page-title {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .page-title span {
            color: var(--accent);
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.82rem;
            letter-spacing: 0.04em;
            padding: 10px 20px;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: all 0.18s ease;
            text-transform: uppercase;
        }

        .btn-primary {
            background: var(--accent);
            color: #0f0f11;
        }
        .btn-primary:hover {
            background: #f5d060;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(240, 192, 64, 0.25);
        }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            background: var(--border);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover {
            color: var(--text);
            border-color: var(--muted);
        }

        .btn-danger {
            background: transparent;
            color: var(--red);
            border: 1px solid rgba(242, 107, 107, 0.3);
        }
        .btn-danger:hover {
            background: rgba(242, 107, 107, 0.1);
        }

        .btn-success {
            background: var(--green);
            color: #0f0f11;
            border: none;
        }
        .btn-success:hover {
            background: #2db574;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.72rem;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--accent-line, var(--border));
        }
        .stat-card.green {
            --accent-line: var(--green);
        }
        .stat-card.blue {
            --accent-line: var(--blue);
        }
        .stat-card.amber {
            --accent-line: var(--accent);
        }
        .stat-card.orange {
            --accent-line: var(--accent2);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }

        .stat-value {
            font-family: 'DM Mono', monospace;
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--text);
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .empty-state {
            background: var(--surface);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            padding: 60px 20px;
            text-align: center;
            color: var(--muted);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }
        .empty-text {
            font-size: 0.9rem;
        }

        .activity-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 22px;
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            align-items: center;
            gap: 18px;
            transition: all 0.18s ease;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .activity-card:hover {
            border-color: var(--muted);
            transform: translateX(2px);
        }

        .status-badge {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .status-badge.aberto {
            background: var(--accent);
            box-shadow: 0 0 8px rgba(240, 192, 64, 0.5);
        }
        .status-badge.andamento {
            background: var(--blue);
            box-shadow: 0 0 8px rgba(91, 156, 246, 0.5);
            animation: blink 1.5s ease infinite;
        }
        .status-badge.finalizado {
            background: var(--green);
        }

        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        .activity-info {
            min-width: 0;
        }

        .activity-service {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .activity-meta {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .meta-item {
            font-family: 'DM Mono', monospace;
            font-size: 0.73rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .activity-status-ctrl {
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 130px;
        }
        .status-option {
            display: flex;
            align-items: center;
            gap: 7px;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.15s;
            user-select: none;
        }
        .status-option:hover {
            background: var(--surface2);
        }

        .status-option input[type=radio] {
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--border);
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .status-option.opt-aberto input:checked {
            border-color: var(--accent);
            background: var(--accent);
        }
        .status-option.opt-andamento input:checked {
            border-color: var(--blue);
            background: var(--blue);
        }
        .status-option.opt-finalizado input:checked {
            border-color: var(--green);
            background: var(--green);
        }

        .activity-actions {
            display: flex;
            gap: 6px;
        }

        .duration-tag {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            padding: 3px 8px;
            border-radius: 20px;
            background: rgba(62, 207, 142, 0.1);
            color: var(--green);
            border: 1px solid rgba(62, 207, 142, 0.2);
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 12, 0.85);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-title .icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(240, 192, 64, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 7px;
        }
        input[type=text],
        input[type=time],
        input[type=date],
        select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus,
        select:focus {
            border-color: var(--accent);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .status-selector {
            display: flex;
            gap: 8px;
        }
        .status-pill {
            flex: 1;
            padding: 8px 10px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--muted);
            user-select: none;
        }
        .status-pill.sel-aberto.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(240, 192, 64, 0.08);
        }
        .status-pill.sel-andamento.active {
            border-color: var(--blue);
            color: var(--blue);
            background: rgba(91, 156, 246, 0.08);
        }
        .status-pill.sel-finalizado.active {
            border-color: var(--green);
            color: var(--green);
            background: rgba(62, 207, 142, 0.08);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
            justify-content: flex-end;
        }

        /* REPORT */
        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--muted);
            cursor: pointer;
            border: none;
            background: none;
            font-family: 'Syne', sans-serif;
            text-transform: uppercase;
            transition: color 0.15s;
            margin-bottom: 24px;
        }
        .back-btn:hover {
            color: var(--text);
        }

        .report-filters {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
            margin-bottom: 24px;
            display: flex;
            align-items: flex-end;
            gap: 16px;
            flex-wrap: wrap;
        }
        .report-filters .form-group {
            margin-bottom: 0;
            flex: 1;
            min-width: 150px;
        }

        .report-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }

        .report-table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-top: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }
        th {
            padding: 13px 18px;
            text-align: left;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }
        td {
            padding: 14px 18px;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border);
            font-family: 'DM Mono', monospace;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .td-service {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
        }

        tfoot td {
            background: var(--surface2);
            font-weight: 700;
            color: var(--accent);
            border-top: 1px solid var(--border);
            border-bottom: none;
        }

        .no-results {
            padding: 48px 20px;
            text-align: center;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .tag-aberto {
            background: rgba(240, 192, 64, 0.1);
            color: var(--accent);
        }
        .tag-andamento {
            background: rgba(91, 156, 246, 0.1);
            color: var(--blue);
        }
        .tag-finalizado {
            background: rgba(62, 207, 142, 0.1);
            color: var(--green);
        }

        .mini-modal {
            max-width: 360px;
        }

        .report-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        @media (max-width: 700px) {
            main {
                padding: 20px;
            }
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
            .report-summary {
                grid-template-columns: 1fr 1fr;
            }
            .activity-card {
                grid-template-columns: auto 1fr;
            }
            .activity-status-ctrl,
            .activity-actions {
                grid-column: 2;
            }
        }
    </style>
</head>
<body>

    <!-- PAGE MAIN -->
    <div id="page-main" class="page active">
        <header>
            <div class="logo">
                <div class="logo-dot"></div>AtendLog</div>
            <div class="header-date" id="header-date"></div>
        </header>
        <main>
            <div class="top-bar">
                <div class="page-title">Atendimentos de <span id="today-label">hoje</span></div>
                <div class="btn-group">
                    <button class="btn btn-ghost" onclick="goReport()">📊 Relatório</button>
                    <button class="btn btn-primary" onclick="openAddModal()">+ Adicionar Atividade</button>
                </div>
            </div>

            <div class="stats-bar">
                <div class="stat-card amber"><div class="stat-label">Total Hoje</div><div class="stat-value" id="stat-total">0</div></div>
                <div class="stat-card green"><div class="stat-label">Finalizados</div><div class="stat-value" id="stat-fin">0</div></div>
                <div class="stat-card blue"><div class="stat-label">Em Andamento</div><div class="stat-value" id="stat-and">0</div></div>
                <div class="stat-card orange"><div class="stat-label">Tempo Total</div><div class="stat-value" id="stat-time" style="font-size:1.1rem">—</div></div>
            </div>

            <div class="activity-list" id="activity-list"></div>
        </main>
    </div>

    <!-- PAGE REPORT -->
    <div id="page-report" class="page">
        <header>
            <div class="logo">
                <div class="logo-dot"></div>AtendLog</div>
            <div class="header-date" id="header-date-r"></div>
        </header>
        <main>
            <button class="back-btn" onclick="goMain()">← Voltar</button>
            <div class="top-bar" style="margin-bottom:20px;">
                <div class="page-title">📊 Relatório de <span>Atendimentos</span></div>
                <div class="report-actions">
                    <button class="btn btn-ghost btn-sm" onclick="runReport()">🔄 Atualizar</button>
                    <button class="btn btn-ghost btn-sm" onclick="toggleReportList()">👁️‍🗨️ Ocultar lista</button>
                    <button class="btn btn-primary btn-sm" onclick="exportCSV()">📥 Exportar CSV</button>
                </div>
            </div>

            <div class="report-filters">
                <div class="form-group"><label>Data Início</label><input type="date" id="filter-start"></div>
                <div class="form-group"><label>Data Fim</label><input type="date" id="filter-end"></div>
                <div class="form-group" style="min-width:130px;"><label>Status</label>
                    <select id="filter-status">
                        <option value="">Todos</option>
                        <option value="aberto">Aberto</option>
                        <option value="andamento">Em Andamento</option>
                        <option value="finalizado">Finalizado</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="runReport()">Filtrar</button>
            </div>

            <div class="report-summary" id="report-summary"></div>
            <div class="report-table-wrap" id="report-table-wrap">
                <div id="report-body"></div>
            </div>
        </main>
    </div>

    <!-- MODAL ADD/EDIT -->
    <div class="modal-overlay" id="modal-add" style="display:none;" onclick="closeModalAdd(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-title"><div class="icon">📋</div><span id="modal-title-text">Nova Atividade</span></div>
            <div class="form-group"><label>Serviço Realizado *</label><input type="text" id="f-service" placeholder="Descreva o serviço..."></div>
            <div class="form-group"><label>Solicitante *</label><input type="text" id="f-requester" placeholder="Nome do solicitante..."></div>
            <div class="form-row">
                <div class="form-group"><label>Hora Início</label><input type="time" id="f-start"></div>
                <div class="form-group"><label>Hora Fim</label><input type="time" id="f-end"></div>
            </div>
            <div class="form-group"><label>Data</label><input type="date" id="f-date"></div>
            <div class="form-group"><label>Status</label>
                <div class="status-selector">
                    <div class="status-pill sel-aberto active" data-val="aberto" onclick="selectStatus(this)">Aberto</div>
                    <div class="status-pill sel-andamento" data-val="andamento" onclick="selectStatus(this)">Em Andamento</div>
                    <div class="status-pill sel-finalizado" data-val="finalizado" onclick="selectStatus(this)">Finalizado</div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeAdd()">Cancelar</button>
                <button class="btn btn-primary" onclick="saveActivity()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- MODAL END TIME -->
    <div class="modal-overlay" id="modal-endtime" style="display:none;" onclick="closeEndTimeModal(event)">
        <div class="modal mini-modal" onclick="event.stopPropagation()">
            <div class="modal-title"><div class="icon" style="background:rgba(62,207,142,0.15);">✅</div>Finalizar Atendimento</div>
            <p style="font-size:0.85rem; color:var(--muted); margin-bottom:20px;">Informe a hora de término para concluir o atendimento.</p>
            <div class="form-group"><label>Hora Fim *</label><input type="time" id="et-time"></div>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="cancelEndTime()">Cancelar</button>
                <button class="btn btn-primary" style="background:var(--green);color:#0f0f11;" onclick="confirmEndTime()">Finalizar</button>
            </div>
        </div>
    </div>

    <script>
        // ─── API CONFIG ───────────────────────────────────────────────
        const API_URL = 'https://script.google.com/macros/s/AKfycbysWsX1ABUH15JqijP39T_TY4G4Kr8pTLHzU7XY1RebJw_M3NDY757IZmzP6OCcKnL4AA/exec';

        let activities = [];
        let editingId = null;
        let pendingFinishId = null;
        let selectedStatus = 'aberto';
        let reportVisible = true;

        // ─── COMMUNICATION WITH GOOGLE SHEETS ────────────────────────
        async function loadActivities() {
            try {
                const resp = await fetch(API_URL);
                const data = await resp.json();
                activities = Array.isArray(data) ? data : [];
                renderMain();
            } catch (e) {
                console.error(e);
                activities = [];
                renderMain();
            }
        }

        async function syncToSheet(activity, action = 'upsert') {
            try {
                if (action === 'delete') {
                    await fetch(API_URL + '?action=delete&id=' + encodeURIComponent(activity.id), { method: 'POST' });
                } else {
                    await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(activity)
                    });
                }
                return true;
            } catch (e) {
                console.error(e);
                alert('Erro ao salvar na planilha.');
                return false;
            }
        }

        // ─── UTILS ────────────────────────────────────────────────────
        const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

        const today = () => new Date().toISOString().split('T')[0];

        const fmtDate = s => {
            if (!s) return '';
            const [y, m, d] = s.split('-');
            return `${d}/${m}/${y}`;
        };

        const minutesBetween = (t1, t2) => {
            if (!t1 || !t2) return null;
            const [h1, m1] = t1.split(':').map(Number);
            const [h2, m2] = t2.split(':').map(Number);
            const diff = (h2 * 60 + m2) - (h1 * 60 + m1);
            return diff >= 0 ? diff : null;
        };

        const fmtDuration = mins => {
            if (mins === null || mins === undefined) return '—';
            if (mins < 60) return `${mins}min`;
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            return m ? `${h}h ${m}min` : `${h}h`;
        };

        const fmtTotal = mins => {
            if (!mins) return '—';
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            return m ? `${h}h ${m}min` : `${h}h`;
        };

        function updateDates() {
            const now = new Date();
            const opts = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('header-date').textContent = now.toLocaleDateString('pt-BR', opts);
            const r = document.getElementById('header-date-r');
            if (r) r.textContent = now.toLocaleDateString('pt-BR', opts);
            document.getElementById('today-label').textContent = now.toLocaleDateString('pt-BR', { day: 'numeric',
                month: 'long' });
        }

        // ─── PAGES ────────────────────────────────────────────────────
        function goReport() {
            document.getElementById('page-main').classList.remove('active');
            document.getElementById('page-report').classList.add('active');
            const t = today();
            document.getElementById('filter-start').value = t;
            document.getElementById('filter-end').value = t;
            runReport();
        }

        function goMain() {
            document.getElementById('page-report').classList.remove('active');
            document.getElementById('page-main').classList.add('active');
        }

        // ─── RENDER MAIN ──────────────────────────────────────────────
        function renderMain() {
            const todayActivities = activities.filter(a => a.date === today());

            document.getElementById('stat-total').textContent = todayActivities.length;
            document.getElementById('stat-fin').textContent = todayActivities.filter(a => a.status ===
                'finalizado').length;
            document.getElementById('stat-and').textContent = todayActivities.filter(a => a.status === 'andamento')
                .length;

            const totalMins = todayActivities
                .filter(a => a.status === 'finalizado' && a.timeStart && a.timeEnd)
                .reduce((acc, a) => acc + (minutesBetween(a.timeStart, a.timeEnd) || 0), 0);
            document.getElementById('stat-time').textContent = totalMins ? fmtTotal(totalMins) : '—';

            const list = document.getElementById('activity-list');
            if (!todayActivities.length) {
                list.innerHTML =
                    `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Nenhum atendimento registrado hoje.<br>Clique em <strong>+ Adicionar Atividade</strong> para começar.</div></div>`;
                return;
            }

            list.innerHTML = todayActivities.map(a => {
                const isOpenOrProgress = a.status === 'aberto' || a.status === 'andamento';
                const mins = minutesBetween(a.timeStart, a.timeEnd);
                const durTag = mins !== null ? `<span class="duration-tag">⏱ ${fmtDuration(mins)}</span>` : '';
                return `<div class="activity-card" id="card-${a.id}">
            <div class="status-badge ${a.status}"></div>
            <div class="activity-info">
              <div class="activity-service">${a.service}</div>
              <div class="activity-meta">
                <span class="meta-item">👤 ${a.requester}</span>
                ${a.timeStart ? `<span class="meta-item">🕐 ${a.timeStart}</span>` : ''}
                ${a.timeEnd ? `<span class="meta-item">🕔 ${a.timeEnd}</span>` : ''}
                ${durTag}
              </div>
            </div>
            <div class="activity-status-ctrl">
              ${['aberto','andamento','finalizado'].map(s => `
                <label class="status-option opt-${s}">
                  <input type="radio" name="status-${a.id}" value="${s}" ${a.status===s?'checked':''} onchange="changeStatus('${a.id}','${s}')">
                  ${s==='aberto'?'Aberto':s==='andamento'?'Em Andamento':'Finalizado'}
                </label>`).join('')}
            </div>
            <div class="activity-actions">
              ${isOpenOrProgress ? `<button class="btn btn-success btn-sm" onclick="handleCloseActivity('${a.id}')">✅ Fechar</button>` : ''}
              <button class="btn btn-ghost btn-sm" onclick="openEditModal('${a.id}')">✏️</button>
              <button class="btn btn-danger btn-sm" onclick="deleteActivity('${a.id}')">🗑</button>
            </div>
          </div>`;
            }).join('');
        }

        // ─── HANDLE CLOSE ACTIVITY (via "Fechar" button) ─────────────
        function handleCloseActivity(id) {
            pendingFinishId = id;
            document.getElementById('et-time').value = '';
            document.getElementById('modal-endtime').style.display = 'flex';
        }

        // ─── STATUS CHANGE (radios) ──────────────────────────────────
        async function changeStatus(id, newStatus) {
            if (newStatus === 'finalizado') {
                handleCloseActivity(id);
            } else {
                const act = activities.find(a => a.id === id);
                if (act) {
                    act.status = newStatus;
                    if (await syncToSheet(act)) {
                        await loadActivities();
                    }
                }
            }
        }

        function cancelEndTime() {
            document.getElementById('modal-endtime').style.display = 'none';
            pendingFinishId = null;
            loadActivities();
        }

        function closeEndTimeModal(e) {
            if (e.target === document.getElementById('modal-endtime')) cancelEndTime();
        }

        async function confirmEndTime() {
            const t = document.getElementById('et-time').value;
            if (!t) { alert('Por favor, informe a hora fim.'); return; }
            const act = activities.find(a => a.id === pendingFinishId);
            if (act) {
                act.status = 'finalizado';
                act.timeEnd = t;
                if (await syncToSheet(act)) {
                    document.getElementById('modal-endtime').style.display = 'none';
                    pendingFinishId = null;
                    await loadActivities();
                }
            }
        }

        // ─── ADD / EDIT MODAL ─────────────────────────────────────────
        function openAddModal() {
            editingId = null;
            selectedStatus = 'aberto';
            document.getElementById('modal-title-text').textContent = 'Nova Atividade';
            document.getElementById('f-service').value = '';
            document.getElementById('f-requester').value = '';
            document.getElementById('f-start').value = new Date().toTimeString().slice(0, 5);
            document.getElementById('f-end').value = '';
            document.getElementById('f-date').value = today();
            setStatusPills('aberto');
            document.getElementById('modal-add').style.display = 'flex';
        }

        function openEditModal(id) {
            const act = activities.find(a => a.id === id);
            if (!act) return;
            editingId = id;
            selectedStatus = act.status;
            document.getElementById('modal-title-text').textContent = 'Editar Atividade';
            document.getElementById('f-service').value = act.service;
            document.getElementById('f-requester').value = act.requester;
            document.getElementById('f-start').value = act.timeStart || '';
            document.getElementById('f-end').value = act.timeEnd || '';
            document.getElementById('f-date').value = act.date;
            setStatusPills(act.status);
            document.getElementById('modal-add').style.display = 'flex';
        }

        function closeAdd() { document.getElementById('modal-add').style.display = 'none'; }

        function closeModalAdd(e) { if (e.target === document.getElementById('modal-add')) closeAdd(); }

        function selectStatus(el) {
            document.querySelectorAll('.status-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            selectedStatus = el.dataset.val;
        }

        function setStatusPills(val) {
            document.querySelectorAll('.status-pill').forEach(p => p.classList.toggle('active', p.dataset.val === val));
            selectedStatus = val;
        }

        async function saveActivity() {
            const service = document.getElementById('f-service').value.trim();
            const requester = document.getElementById('f-requester').value.trim();
            const timeStart = document.getElementById('f-start').value;
            const timeEnd = document.getElementById('f-end').value;
            const date = document.getElementById('f-date').value;

            if (!service) { document.getElementById('f-service').focus(); return; }
            if (!requester) { document.getElementById('f-requester').focus(); return; }

            let activity;
            if (editingId) {
                activity = activities.find(a => a.id === editingId);
                if (activity) Object.assign(activity, { service, requester, timeStart, timeEnd, date,
                    status: selectedStatus });
                else return;
            } else {
                activity = { id: uid(), service, requester, timeStart, timeEnd, date, status: selectedStatus };
            }

            if (await syncToSheet(activity)) {
                closeAdd();
                await loadActivities();
            }
        }

        async function deleteActivity(id) {
            if (!confirm('Remover este atendimento?')) return;
            if (await syncToSheet({ id }, 'delete')) {
                await loadActivities();
            }
        }

        // ─── REPORT ────────────────────────────────────────────────────
        let lastReportData = [];

        async function runReport() {
            const start = document.getElementById('filter-start').value;
            const end = document.getElementById('filter-end').value;
            const status = document.getElementById('filter-status').value;

            await loadActivities();

            let filtered = activities;
            if (start) filtered = filtered.filter(a => a.date >= start);
            if (end) filtered = filtered.filter(a => a.date <= end);
            if (status) filtered = filtered.filter(a => a.status === status);

            filtered.sort((a, b) => {
                if (a.date !== b.date) return a.date > b.date ? 1 : -1;
                return (a.timeStart || '') > (b.timeStart || '') ? 1 : -1;
            });

            lastReportData = filtered;

            const total = filtered.length;
            const fin = filtered.filter(a => a.status === 'finalizado').length;
            const totalMins = filtered
                .filter(a => a.status === 'finalizado' && a.timeStart && a.timeEnd)
                .reduce((acc, a) => acc + (minutesBetween(a.timeStart, a.timeEnd) || 0), 0);

            document.getElementById('report-summary').innerHTML = `
            <div class="stat-card amber"><div class="stat-label">Total no Período</div><div class="stat-value">${total}</div></div>
            <div class="stat-card green"><div class="stat-label">Finalizados</div><div class="stat-value">${fin}</div></div>
            <div class="stat-card orange"><div class="stat-label">Tempo Total</div><div class="stat-value" style="font-size:1.1rem">${fmtTotal(totalMins)}</div></div>
          `;

            const body = document.getElementById('report-body');
            if (!filtered.length) {
                body.innerHTML =
                    `<div class="no-results">Nenhum atendimento encontrado para os filtros selecionados.</div>`;
                return;
            }

            const rows = filtered.map(a => {
                const mins = minutesBetween(a.timeStart, a.timeEnd);
                const statusMap = { aberto: 'tag-aberto', andamento: 'tag-andamento',
                    finalizado: 'tag-finalizado' };
                const statusLabel = { aberto: 'Aberto', andamento: 'Em Andamento',
                finalizado: 'Finalizado' };
                return `<tr>
              <td>${fmtDate(a.date)}</td>
              <td class="td-service">${a.service}</td>
              <td>${a.requester}</td>
              <td>${a.timeStart||'—'}</td>
              <td>${a.timeEnd||'—'}</td>
              <td>${fmtDuration(mins)}</td>
              <td><span class="tag ${statusMap[a.status]}">${statusLabel[a.status]}</span></td>
            </tr>`;
            }).join('');

            body.innerHTML = `
            <table>
              <thead><tr><th>Data</th><th>Serviço</th><th>Solicitante</th><th>Início</th><th>Fim</th><th>Duração</th><th>Status</th></tr></thead>
              <tbody>${rows}</tbody>
              <tfoot><tr><td colspan="5" style="text-align:right; color:var(--muted);">TEMPO TOTAL</td><td colspan="2">${fmtTotal(totalMins)}</td></tr></tfoot>
            </table>`;

            if (!reportVisible) {
                toggleReportList();
            }
        }

        function toggleReportList() {
            const wrap = document.getElementById('report-table-wrap');
            const btn = document.querySelector('.page.active .report-actions button:nth-child(2)');
            reportVisible = !reportVisible;
            wrap.style.display = reportVisible ? '' : 'none';
            btn.textContent = reportVisible ? '👁️‍🗨️ Ocultar lista' : '👁️ Mostrar lista';
        }

        // ─── EXPORT CSV ───────────────────────────────────────────────
        function exportCSV() {
            if (!lastReportData.length) {
                alert('Nenhum dado para exportar. Aplique os filtros primeiro.');
                return;
            }
            const headers = ['Data', 'Serviço', 'Solicitante', 'Início', 'Fim', 'Duração (min)', 'Status'];
            const rows = lastReportData.map(a => {
                const mins = minutesBetween(a.timeStart, a.timeEnd);
                return [
                    fmtDate(a.date),
                    a.service,
                    a.requester,
                    a.timeStart || '',
                    a.timeEnd || '',
                    mins || '',
                    a.status
                ];
            });

            let csv = '\uFEFF';
            csv += headers.join(';') + '\n';
            rows.forEach(r => csv += r.join(';') + '\n');

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `relatorio_atendimentos_${today()}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ─── INIT ──────────────────────────────────────────────────────
        updateDates();
        loadActivities();
    </script>
</body>
</html>
